<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Template Literals & Arrow Functions</h1>

    <script type="module">
        let firstname = prompt("enter your name")

        let msg = `hello ${firstname}`
        console.log(msg)

        const my_fun = () => {
            return console.log("arrow function running...")
        }

        my_fun()

    </script>
</body>

</html>
